version: 2
updates:
- package-ecosystem: nuget
  directory: /
  schedule:
    interval: weekly
    day: monday
  commit-message:
    prefix: deps
  labels:
  - dependencies
  - automated
  groups:
    minor-and-patch:
      patterns:
      - '*'
      update-types:
      - minor
      - patch
    nuget_security:
      applies-to: security-updates
      patterns:
      - '*'
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: monthly
  commit-message:
    prefix: ci
  labels:
  - ci
  - automated
  groups:
    github-actions:
      patterns:
      - '*'
    github_actions_security:
      applies-to: security-updates
      patterns:
      - '*'
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
