<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Rich purple gradient matching Jellyfin brand -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="50%" stop-color="#1A1035"/>
      <stop offset="100%" stop-color="#0F0A1E"/>
    </linearGradient>
    <!-- Accent gradient for icon elements -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle right-side glow -->
    <radialGradient id="rightGlow" cx="85%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#rightGlow)"/>

  <!-- Subtle waveform pattern (audio visualization) -->
  <g opacity="0.035" stroke="#C4B5FD" stroke-width="1.5" fill="none">
    <path d="M0,100 Q50,85 100,100 T200,100 T300,100 T400,100 T500,100 T600,100 T700,100 T800,100 T900,100"/>
    <path d="M0,100 Q50,70 100,100 T200,100 T300,100 T400,100 T500,100 T600,100 T700,100 T800,100 T900,100"/>
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.04" fill="#C4B5FD">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="100" cy="30" r="1.5"/>
    <circle cx="150" cy="30" r="1.5"/>
    <circle cx="750" cy="170" r="1.5"/>
    <circle cx="800" cy="170" r="1.5"/>
    <circle cx="850" cy="170" r="1.5"/>
    <circle cx="50" cy="60" r="1"/>
    <circle cx="100" cy="60" r="1"/>
    <circle cx="850" cy="140" r="1"/>
    <circle cx="800" cy="140" r="1"/>
  </g>

  <!-- Icon glow -->
  <circle cx="255" cy="100" r="70" fill="url(#iconGlow)"/>

  <!-- Speech bubble icon with subtitle lines -->
  <g transform="translate(255, 96)">
    <!-- Speech bubble outline -->
    <path d="M-38,-34 L38,-34 C44,-34 48,-30 48,-24 L48,14 C48,20 44,24 38,24 L6,24 L-2,38 L-6,24 L-38,24 C-44,24 -48,20 -48,14 L-48,-24 C-48,-30 -44,-34 -38,-34 Z"
          fill="rgba(139,92,246,0.08)" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <!-- Subtitle text lines inside bubble -->
    <rect x="-30" y="-20" width="38" height="3.5" rx="1.75" fill="#C4B5FD" opacity="0.65"/>
    <rect x="-30" y="-11" width="50" height="3.5" rx="1.75" fill="#A78BFA" opacity="0.45"/>
    <rect x="-30" y="-2" width="32" height="3.5" rx="1.75" fill="#C4B5FD" opacity="0.65"/>
    <rect x="-30" y="7" width="44" height="3.5" rx="1.75" fill="#A78BFA" opacity="0.45"/>
    <!-- Sound wave arcs -->
    <path d="M54,-12 C60,-6 60,6 54,12" fill="none" stroke="#A78BFA" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
    <path d="M62,-20 C72,-10 72,10 62,20" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M70,-28 C84,-14 84,14 70,28" fill="none" stroke="#A78BFA" stroke-width="1.2" stroke-linecap="round" opacity="0.18"/>
  </g>

  <!-- Title text — centered in remaining space -->
  <text x="580" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">
    WhisperSubs
  </text>

  <!-- Tagline -->
  <text x="580" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#A78BFA" text-anchor="middle" letter-spacing="0.8" opacity="0.85">
    Local AI subtitle generation for Jellyfin
  </text>

  <!-- Subtle separator dot -->
  <circle cx="580" cy="138" r="2" fill="#8B5CF6" opacity="0.35"/>

  <!-- Tech badges row -->
  <text x="580" y="155" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="10" fill="#6D28D9" text-anchor="middle" letter-spacing="2" opacity="0.5">
    WHISPER.CPP  ·  PRIVATE  ·  ON-DEVICE
  </text>
</svg>
